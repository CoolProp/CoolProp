name: Mathcad wrapper

on:
  # ========= Run on Pushes and Pull_Requests
  push:
    branches: [ 'master', 'main', 'develop', 'actions_mathcad' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ 'master', 'main', 'develop' ]
  # ========= Run on call from other workflows
  workflow_call:

concurrency:
  # Cancel superseded runs on the same ref to cut CI backlog on heavy
  # dev days (repeated pushes to an open PR).  Protected: master / main
  # / develop and tags never cancel, so mainline + release runs always
  # complete.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    # Get the PTC build library and header in the proper location
    - name: Get dependencies
      shell: bash
      run: |
        mkdir "Custom Functions"
        cd "Custom Functions"        
        cp ../wrappers/MathCAD/Prime/libs/MCADINCL.H .
        cp ../wrappers/MathCAD/Prime/libs/mcaduser.lib .

    - name: Configure CMake
      run: cmake -DCOOLPROP_PRIME_MODULE:BOOL=ON -DCOOLPROP_PRIME_ROOT:STRING="${{ github.workspace }}" -B build -S .

    - name: Build
      # `$(nproc)` is empty in the default Windows pwsh shell (nproc is a
      # GNU coreutils binary, not a pwsh command), collapsing to a bare `-j`.
      # Run under Git-Bash and resolve the core count portably. Mirrors
      # csharp_builder.yml / library_shared.yml.
      shell: bash
      run: |
        JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)
        echo "Building with -j$JOBS"
        cmake --build build --target CoolPropMathcadWrapper -j "$JOBS" --config Release
        cmake --build build --target install --config Release

    - name: Archive artifacts
      uses: actions/upload-artifact@v7
      with:
          name: MathcadPrime
          path: install_root/MathcadPrime
