name: Python cibuildwheel

# Wheel-matrix gating (CoolProp-rog):
#   • On master/develop pushes, tags, and PRs carrying the `full-wheels`
#     label, build the full matrix (6 Pythons × ~7 arches ≈ 42 wheels).
#   • On every other PR, build a representative subset (1 Linux x86_64,
#     1 Linux aarch64, 1 Windows AMD64, 1 macOS arm64 — newest Python
#     only). Cuts ~90% of PR wheel CI minutes while still catching
#     cross-platform breakage pre-merge.
# Adding the `full-wheels` label to an open PR triggers a fresh full
# build (via the `labeled` event type); other label changes are ignored
# by the gate in `set-matrix`.

on:
  push:
    branches: [ 'master', 'main', 'develop', 'actions_pypi' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ 'master', 'main', 'develop' ]
    types: [opened, synchronize, reopened, labeled]

concurrency:
  # Cancel superseded runs on the same ref to cut CI backlog on heavy
  # dev days (repeated pushes to an open PR).  Protected: master / main
  # / develop and tags never cancel, so mainline + release runs always
  # complete.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  set-version:
    # Skip this whole workflow on label events unless the label is `full-wheels`,
    # otherwise every unrelated label change would spawn a wheel build.
    if: github.event_name != 'pull_request' || github.event.action != 'labeled' || github.event.label.name == 'full-wheels'
    runs-on: ubuntu-latest
    outputs:
      testpypiversion: ${{ steps.set.outputs.testpypiversion }}
    steps:
      - name: Set version for testpypi
        id: set
        run: echo "testpypiversion=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

  set-matrix:
    needs: set-version
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.detect.outputs.full }}
      py_versions: ${{ steps.detect.outputs.py_versions }}
      ubuntu_archs: ${{ steps.detect.outputs.ubuntu_archs }}
      ubuntu_arm_archs: ${{ steps.detect.outputs.ubuntu_arm_archs }}
      windows_archs: ${{ steps.detect.outputs.windows_archs }}
      macos_archs: ${{ steps.detect.outputs.macos_archs }}
    steps:
      - name: Decide full vs subset matrix
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          full=false
          if [[ "$EVENT_NAME" == "push" || "$EVENT_NAME" == "schedule" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            full=true
          elif [[ "$EVENT_NAME" == "pull_request" ]] && echo "$LABELS_JSON" | grep -q '"full-wheels"'; then
            full=true
          fi
          echo "Mode: $(if $full; then echo full; else echo subset; fi)"
          echo "full=$full" >> "$GITHUB_OUTPUT"
          # v8 go-live (bd CoolProp-r9sq.6): the wheels are now nanobind. The cp312
          # build is abi3-tagged (one cp312-abi3 wheel covers 3.12/3.13/3.14), so
          # 3.13/3.14 are dropped from the matrix to avoid building duplicate abi3
          # wheels; 3.9-3.11 stay per-version (below nanobind's stable-ABI floor).
          if $full; then
            echo 'py_versions=[39, 310, 311, 312]' >> "$GITHUB_OUTPUT"
            echo 'ubuntu_archs=["x86_64"]' >> "$GITHUB_OUTPUT"
            echo 'ubuntu_arm_archs=["aarch64"]' >> "$GITHUB_OUTPUT"
            echo 'windows_archs=["AMD64", "x86", "ARM64"]' >> "$GITHUB_OUTPUT"
            echo 'macos_archs=["x86_64", "arm64"]' >> "$GITHUB_OUTPUT"
          else
            echo 'py_versions=[312]' >> "$GITHUB_OUTPUT"
            echo 'ubuntu_archs=["x86_64"]' >> "$GITHUB_OUTPUT"
            echo 'ubuntu_arm_archs=["aarch64"]' >> "$GITHUB_OUTPUT"
            echo 'windows_archs=["AMD64"]' >> "$GITHUB_OUTPUT"
            echo 'macos_archs=["arm64"]' >> "$GITHUB_OUTPUT"
          fi

  python_source:
    needs: set-version
    name: Build source package
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.13.x

    - name: Install dependencies
      run: pip install setuptools wheel Cython requests jinja2 pyyaml packaging

    - name: Figure out the TestPyPi/PyPi Version
      shell: bash
      run: |
        set -euo pipefail
        if [[ "$GITHUB_REF" == *"refs/tags"* ]]; then
          # Gate (CoolProp-1tbe.3): the published REAL-PyPI version is derived
          # from CMakeLists.txt, NOT the tag name. Assert the tag matches the
          # CMakeLists version and is not a .dev release before publishing
          # (else e.g. a v8.0.0b1 tag on an unbumped 7.2.1dev tree would publish
          # 7.2.1.dev0). --current pins the published version to CMakeLists (no
          # auto-increment), so tag == CMakeLists == published.
          python dev/ci/check_tag_version.py "$GITHUB_REF"
          COOLPROP_VERSION_OVERRIDE=$(python dev/extract_version.py --pypi --current)
        else
          COOLPROP_VERSION_OVERRIDE=$(python dev/extract_version.py --version "${{ needs.set-version.outputs.testpypiversion }}")
        fi
        # Fail loudly rather than fall back to the static CMakeLists version: an
        # empty override would silently re-publish 7.2.1.dev0 and get skipped by
        # twine --skip-existing, which is exactly the #2988 failure mode.
        if [[ -z "$COOLPROP_VERSION_OVERRIDE" ]]; then
          echo "::error::extract_version.py returned an empty version"
          exit 1
        fi
        echo "Resolved package version: $COOLPROP_VERSION_OVERRIDE"
        # The sdist build resolves the version via dev/coolprop_version_provider.py,
        # which reads this env var (see pyproject.toml).
        echo "COOLPROP_VERSION_OVERRIDE=$COOLPROP_VERSION_OVERRIDE" >> "$GITHUB_ENV"

    - name: Build package, sdist
      run: |
        pip install build
        python -m build --sdist --outdir ${GITHUB_WORKSPACE}/Python

    - name: Store artifacts
      uses: actions/upload-artifact@v7
      with:
        name: Python-sdist
        path: |
          ./Python/*.tar.gz

  python_ubuntu:
    needs: [set-version, set-matrix]
    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ${{ fromJSON(needs.set-matrix.outputs.py_versions) }}
        arch: ${{ fromJSON(needs.set-matrix.outputs.ubuntu_archs) }}
    uses: ./.github/workflows/python_cibuildwheel.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      arch: ${{ matrix.arch }}
      TESTPYPI_VERSION: ${{ needs.set-version.outputs.testpypiversion }}

  python_ubuntu_arm:
    needs: [set-version, set-matrix]
    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm]
        python-version: ${{ fromJSON(needs.set-matrix.outputs.py_versions) }}
        arch: ${{ fromJSON(needs.set-matrix.outputs.ubuntu_arm_archs) }}
    uses: ./.github/workflows/python_cibuildwheel.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      arch: ${{ matrix.arch }}
      TESTPYPI_VERSION: ${{ needs.set-version.outputs.testpypiversion }}

  python_windows:
    needs: [set-version, set-matrix]
    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.set-matrix.outputs.py_versions) }}
        arch: ${{ fromJSON(needs.set-matrix.outputs.windows_archs) }}
    uses: ./.github/workflows/python_cibuildwheel.yml
    with:
      # Runner selection for Windows ARM64 (CoolProp-6z0a):
      #   • CPython ships a native win_arm64 interpreter only for 3.11+, so
      #     ARM64 on py>=3.11 builds NATIVELY on the windows-11-arm runner.
      #     Native build means delvewheel (cibuildwheel 4.0's default Windows
      #     repair) can resolve the ARM64 VC runtime, so the wheel repairs.
      #   • ARM64 on py3.9/3.10 has no native interpreter; it must cross-compile
      #     on the x64 windows-latest host, where delvewheel can't find the
      #     ARM64 msvcp140.dll — so repair is disabled on that leg (see the
      #     reusable workflow's CIBW_REPAIR_WHEEL_COMMAND_WINDOWS).
      #   • AMD64/x86 always run on windows-latest with the default repair.
      # python-version is encoded as 39/310/311/312 (monotonic with the real
      # version), so `>= 311` correctly means CPython >= 3.11.
      os: ${{ (matrix.arch == 'ARM64' && matrix.python-version >= 311) && 'windows-11-arm' || 'windows-latest' }}
      python-version: ${{ matrix.python-version }}
      arch: ${{ matrix.arch }}
      TESTPYPI_VERSION: ${{ needs.set-version.outputs.testpypiversion }}

  python_macos:
    needs: [set-version, set-matrix]
    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        os: [macos-latest]
        python-version: ${{ fromJSON(needs.set-matrix.outputs.py_versions) }}
        arch: ${{ fromJSON(needs.set-matrix.outputs.macos_archs) }}
    uses: ./.github/workflows/python_cibuildwheel.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      arch: ${{ matrix.arch }}
      TESTPYPI_VERSION: ${{ needs.set-version.outputs.testpypiversion }}

  python_pyodide:
    needs: [set-version, set-matrix]
    strategy:
      fail-fast: false
      matrix:
        python-version: [313,314]
        arch: [wasm32]
    uses: ./.github/workflows/python_cibuildwheel.yml
    with:
      os: ubuntu-latest
      python-version: ${{ matrix.python-version }}
      arch: ${{ matrix.arch }}
      platform: pyodide
      TESTPYPI_VERSION: ${{ needs.set-version.outputs.testpypiversion }}

  merge_wheels:
   runs-on: ubuntu-latest
   needs: [python_source, python_ubuntu, python_ubuntu_arm, python_windows, python_macos, python_pyodide]
   steps:
     - name: Merge Artifacts
       uses: actions/upload-artifact/merge@v7
       with:
         name: Python
         pattern: Python-*

  upload_python_bindings_to_pypi:
    needs: merge_wheels
    name: Upload to PyPi
    runs-on: ubuntu-latest
    steps:

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.13.x

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine requests packaging

        if [[ "$GITHUB_REF" == *"refs/tags"* ]]; then
          TWINE_REPOSITORY=pypi
          TWINE_PASSWORD=${{ secrets.PYPI_TOKEN }}
        else
          TWINE_REPOSITORY=testpypi
          TWINE_PASSWORD=${{ secrets.TESTPYPI_TOKEN }}
        fi;
        echo "Using TWINE_REPOSITORY=$TWINE_REPOSITORY"
        echo "TWINE_REPOSITORY=$TWINE_REPOSITORY" >> $GITHUB_ENV
        echo "TWINE_PASSWORD=$TWINE_PASSWORD" >> $GITHUB_ENV

    - name: Download ALL wheels
      uses: actions/download-artifact@v8
      with:
        name: Python
        path: Python

    - name: Display structure of downloaded files
      run: |
        set -x
        ls -R
        du -sh

    - name: Publish wheels to (Test)PyPI
      if: ${{ github.event_name != 'pull_request' }}
      env:
        TWINE_USERNAME: __token__
      run: python -m twine upload --verbose --skip-existing Python/*.whl Python/*.tar.gz
