name: Java Wrapper

on:
  push:
    branches: [ 'master', 'main', 'develop' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ 'master', 'main', 'develop' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' && !startsWith(github.ref, 'refs/tags/') }}

# Default the GITHUB_TOKEN to read-only; jobs that need more opt in explicitly.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sysname: Linux
          - os: windows-latest
            sysname: Windows
          - os: macos-latest
            sysname: Darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Java JDK
        uses: actions/setup-java@v5.4.0
        with:
          # The Java version to set up. Takes a whole or semver Java version. See examples of supported syntax in README file
          java-version: '25'
          # Java distribution. See the list of supported distributions in README file
          distribution: 'zulu'
          # The package type (jdk, jre, jdk+fx, jre+fx)
          java-package: 'jdk'
          # Name of the build platform to cache dependencies. It can be "maven", "gradle" or "sbt".
          cache: 'maven'
          # The path to a dependency file: pom.xml, build.gradle, build.sbt, etc. This option can be used with the `cache` option. If this option is omitted, the action searches for the dependency file in the entire repository. This option supports wildcards and a list of file names for caching multiple dependencies.
          cache-dependency-path: 'sub-project/pom.xml' # optional

      - name: Install SWIG + 7zip (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y swig p7zip-full

      - name: Install SWIG + 7zip (macOS)
        if: runner.os == 'macOS'
        run: brew install swig p7zip

      - name: Install SWIG (Windows)
        if: runner.os == 'Windows'
        run: choco install swig -y --no-progress

      - name: Configure
        shell: bash
        run: cmake -B build -S . -DCOOLPROP_JAVA_MODULE=ON -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DCOOLPROP_SWIG_OPTIONS="-package org.coolprop"

      - name: Build and install
        shell: bash
        # Bound parallelism to the core count.  A bare `-j` lets make spawn an
        # unlimited number of concurrent compiles (~60+ for the CoolProp lib),
        # which exhausts RAM on the 16 GB ubuntu runner and gets the runner
        # OOM-killed ("runner received a shutdown signal", exit 143).  Matches
        # every other wrapper workflow (library_shared, javascript, mathcad...).
        # `nproc` is Linux-only (and present in Git-Bash on Windows) but absent
        # on macOS, so fall back to `sysctl`, then a bounded constant.
        run: |
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)
          cmake --build build --target install --config Release -j "$JOBS"

      - name: JSON symbol-leak gate (Java native wrapper)
        # The SWIG Java module compiles the CoolProp sources (incl. the JSON
        # loaders) into CoolPropJava.{so,dylib} — the same exposure the Octave
        # .oct carries, the wrapper where the hidden-visibility regression
        # (CoolProp-rj2i) bit. Assert the link-time export control keeps
        # nlohmann/valijson/rapidjson out of the wrapper's dynamic symbol table.
        # nm-based, so ELF/Mach-O only — the Windows PE .dll exports nothing by
        # default (opt-in .def) and is skipped.
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          # The shared object keeps the platform 'lib' prefix on ELF/Mach-O
          # (PREFIX "" is Windows-only) → libCoolPropJava.{so,dylib}. Include
          # the SONAME-versioned forms (libCoolPropJava.so.<ver>, the regular
          # file behind the symlink) so -type f still finds it if versioned.
          wrapper=$(find build install_root -type f \( -name '*CoolPropJava.so' -o -name '*CoolPropJava.so.*' -o -name '*CoolPropJava.dylib' -o -name '*CoolPropJava.*.dylib' \) | head -1)
          if [ -z "$wrapper" ]; then
            echo "FAIL: CoolPropJava shared object not found under build/ or install_root/" >&2
            exit 1
          fi
          echo "Gating $wrapper"
          ./dev/ci/check-json-symbols.sh "$wrapper"

      - name: Upload per-OS artifact
        uses: actions/upload-artifact@v7
        with:
          name: Java-${{ matrix.sysname }}
          path: install_root/Java

  merge:
    needs: build
    runs-on: ubuntu-latest
    # delete-artifact removes the per-OS intermediates via the Actions API.
    permissions:
      contents: read
      actions: write
    steps:
      - name: Download per-OS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: Java-*
          path: staging

      - name: Assemble unified Java tree
        shell: bash
        run: |
          set -eux
          mkdir -p Java
          for d in staging/Java-*/; do
            [ -f "${d}Example.cs" ] && cp -n "${d}Example.cs" Java/ || true
            [ -f "${d}platform-independent.7z" ] && cp -n "${d}platform-independent.7z" Java/ || true
            find "$d" -maxdepth 1 -type d -name '*bit' -exec cp -r {} Java/ \;
          done
          ls -R Java

      - name: Upload unified Csharp artifact
        uses: actions/upload-artifact@v7
        with:
          name: Java
          path: Java

      - name: Delete intermediate per-OS artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: Java-*
          
