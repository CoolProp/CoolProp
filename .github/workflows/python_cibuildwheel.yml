name: Python build one single wheel

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: true
        type: string
      TESTPYPI_VERSION:
        required: true 
        type: string

jobs:

  build:
    #name: py${{ inputs.python-version }}-${{ inputs.os }}-${{ inputs.arch }}
    runs-on: ${{ inputs.os }}

    steps:
    - name: Show the context for this job
      env:
        EVENT_CONTEXT: ${{ toJSON(github.event) }}
      run: |
        echo $EVENT_CONTEXT

    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.13.x

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install requests packaging ninja

    - name: Figure out the TestPyPi/PyPi Version
      shell: bash
      run: |
        set -euo pipefail
        if [[ "$GITHUB_REF" == *"refs/tags"* ]]; then
          # Gate (CoolProp-1tbe.3): the published REAL-PyPI version is derived
          # from CMakeLists.txt, NOT the tag name. Assert the tag matches the
          # CMakeLists version and is not a .dev release before publishing
          # (else e.g. a v8.0.0b1 tag on an unbumped 7.2.1dev tree would publish
          # 7.2.1.dev0). --current pins the published version to CMakeLists (no
          # auto-increment), so tag == CMakeLists == published.
          python dev/ci/check_tag_version.py "$GITHUB_REF"
          COOLPROP_VERSION_OVERRIDE=$(python dev/extract_version.py --pypi --current)
        else
          COOLPROP_VERSION_OVERRIDE=$(python dev/extract_version.py --version "${{ inputs.TESTPYPI_VERSION }}")
        fi
        # Fail loudly rather than fall back to the static CMakeLists version: an
        # empty override would silently re-publish 7.2.1.dev0 and get skipped by
        # twine --skip-existing, which is exactly the #2988 failure mode.
        if [[ -z "$COOLPROP_VERSION_OVERRIDE" ]]; then
          echo "::error::extract_version.py returned an empty version"
          exit 1
        fi
        echo "Resolved package version: $COOLPROP_VERSION_OVERRIDE"
        # The build resolves the version via dev/coolprop_version_provider.py,
        # which reads this env var (see pyproject.toml).
        echo "COOLPROP_VERSION_OVERRIDE=$COOLPROP_VERSION_OVERRIDE" >> "$GITHUB_ENV"

    - name: Cache CPM packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/CPM
        key: cpm-${{ runner.os }}-${{ inputs.arch }}-${{ hashFiles('cmake/dependencies.cmake') }}
        restore-keys: |
          cpm-${{ runner.os }}-${{ inputs.arch }}-
          cpm-${{ runner.os }}-

    - name: Set up QEMU
      if: ${{ runner.os == 'Linux' }}
      uses: docker/setup-qemu-action@v4.1.0
      with:
        platforms: all

    # cibuildwheel 4.0 makes delvewheel the default Windows repair command, but
    # the cross-compiled win_arm64 wheels (py3.9/3.10 on the x64 windows-latest
    # host) can't be repaired there — delvewheel can't find the ARM64
    # msvcp140.dll and aborts.  Disable repair on that cross leg ONLY, matching
    # pre-4.0 behavior; native ARM64 (windows-11-arm) and AMD64/x86 keep the
    # default delvewheel repair.  Setting the var empty = "skip repair";
    # leaving it unset = cibuildwheel default.  (CoolProp-6z0a)
    - name: Disable delvewheel repair on cross-compiled Windows ARM64
      if: ${{ inputs.os == 'windows-latest' && inputs.arch == 'ARM64' }}
      shell: bash
      run: echo "CIBW_REPAIR_WHEEL_COMMAND_WINDOWS=" >> "$GITHUB_ENV"

    - name: Build and test wheels
      uses: pypa/cibuildwheel@v4.1.0
      env:
        # Make pip tolerant of transient DNS / connection failures on the
        # post-build wheel test (most often hits macOS runners pulling
        # numpy from files.pythonhosted.org). Default pip retries=5 with a
        # short timeout is too aggressive about giving up.
        PIP_RETRIES: 10
        PIP_TIMEOUT: 60
        PIP_DEFAULT_TIMEOUT: 60
        MACOSX_DEPLOYMENT_TARGET: 11.0
        # COOLPROP_NANOBIND=ON is the v8 go-live signal (bd CoolProp-r9sq.6): it
        # drives both the nanobind CMake build and (on Py>=3.12) the abi3 wheel tag
        # via the scikit-build-core overrides in pyproject.toml.  Set on every
        # platform so the published wheel is the nanobind core + State shim.
        CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=11.0 SDKROOT=/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk CPM_SOURCE_CACHE=$HOME/.cache/CPM PIP_RETRIES=10 PIP_TIMEOUT=60 PIP_DEFAULT_TIMEOUT=60 COOLPROP_NANOBIND=ON
        CIBW_BEFORE_BUILD_LINUX: >
          pip install ninja &&
          git config --global --add safe.directory "*"
        CIBW_ENVIRONMENT_LINUX: COOLPROP_CMAKE=default,NATIVE CPM_SOURCE_CACHE=/root/.cache/CPM PIP_RETRIES=10 PIP_TIMEOUT=60 PIP_DEFAULT_TIMEOUT=60 COOLPROP_NANOBIND=ON
        CIBW_ENVIRONMENT_WINDOWS: COOLPROP_NANOBIND=ON PIP_RETRIES=10 PIP_TIMEOUT=60 PIP_DEFAULT_TIMEOUT=60
        # Linux wheels build inside the manylinux container, which does not
        # inherit host env vars; forward the resolved version through so the
        # version provider sees it. macOS/Windows build on the host directly.
        CIBW_ENVIRONMENT_PASS_LINUX: COOLPROP_VERSION_OVERRIDE
        CIBW_BUILD: cp${{ inputs.python-version }}-*
        CIBW_ARCHS_MACOS: ${{ inputs.arch }} # x86_64 arm64 # universal2 is redundant
        CIBW_ARCHS_WINDOWS: ${{ inputs.arch }} # AMD64 x86 ARM64 (ARM64: native on windows-11-arm for py>=3.11, else cross-compiled — see CoolProp-6z0a)
        CIBW_ARCHS_LINUX: ${{ inputs.arch }} # i686 x86_64 aarch64 ppc64le s390x
        # Smoke-test the published v8 wheel: it imports, the nanobind PropsSI works
        # (returns a float for int args), and the State capsule shim loads.
        CIBW_TEST_COMMAND: python -c "import CoolProp; from CoolProp.CoolProp import PropsSI; from CoolProp.State import State; assert '?' not in CoolProp.__gitrevision__; assert isinstance(PropsSI('T','P',101325,'Q',0,'Water'), float)"
        CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
        CIBW_MANYLINUX_I686_IMAGE: manylinux2014
        CIBW_MANYLINUX_AARCH64_IMAGE: manylinux2014
        # CIBW_SKIP: "pp*"
        CIBW_TEST_SKIP: "*-macosx_arm64 *-win_arm64"
      with:
        package-dir: .
        output-dir: Python

    - name: Upload Files
      uses: actions/upload-artifact@v7
      with:
        name: Python-${{ inputs.os }}-${{ inputs.python-version }}-${{ inputs.arch }}
        path: |
          ./Python/*.whl
