name: Python build one single wheel

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: true
        type: string
      TESTPYPI_VERSION:
        required: true 
        type: string

jobs:

  build:
    #name: py${{ inputs.python-version }}-${{ inputs.os }}-${{ inputs.arch }}
    runs-on: ${{ inputs.os }}

    steps:
    - name: Show the context for this job
      env:
        EVENT_CONTEXT: ${{ toJSON(github.event) }}
      run: |
        echo $EVENT_CONTEXT

    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.13.x

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install requests packaging ninja

    - name: Figure out the TestPyPi/PyPi Version
      shell: bash
      run: |
        set -euo pipefail
        if [[ "$GITHUB_REF" == *"refs/tags"* ]]; then
          COOLPROP_VERSION_OVERRIDE=$(python dev/extract_version.py --pypi)
        else
          COOLPROP_VERSION_OVERRIDE=$(python dev/extract_version.py --version "${{ inputs.TESTPYPI_VERSION }}")
        fi
        # Fail loudly rather than fall back to the static CMakeLists version: an
        # empty override would silently re-publish 7.2.1.dev0 and get skipped by
        # twine --skip-existing, which is exactly the #2988 failure mode.
        if [[ -z "$COOLPROP_VERSION_OVERRIDE" ]]; then
          echo "::error::extract_version.py returned an empty version"
          exit 1
        fi
        echo "Resolved package version: $COOLPROP_VERSION_OVERRIDE"
        # The build resolves the version via dev/coolprop_version_provider.py,
        # which reads this env var (see pyproject.toml).
        echo "COOLPROP_VERSION_OVERRIDE=$COOLPROP_VERSION_OVERRIDE" >> "$GITHUB_ENV"

    - name: Cache CPM packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/CPM
        key: cpm-${{ runner.os }}-${{ inputs.arch }}-${{ hashFiles('cmake/dependencies.cmake') }}
        restore-keys: |
          cpm-${{ runner.os }}-${{ inputs.arch }}-
          cpm-${{ runner.os }}-

    - name: Set up QEMU
      if: ${{ runner.os == 'Linux' }}
      uses: docker/setup-qemu-action@v4.1.0
      with:
        platforms: all

    - name: Build and test wheels
      uses: pypa/cibuildwheel@v3.4.1
      env:
        # Make pip tolerant of transient DNS / connection failures on the
        # post-build wheel test (most often hits macOS runners pulling
        # numpy from files.pythonhosted.org). Default pip retries=5 with a
        # short timeout is too aggressive about giving up.
        PIP_RETRIES: 10
        PIP_TIMEOUT: 60
        PIP_DEFAULT_TIMEOUT: 60
        MACOSX_DEPLOYMENT_TARGET: 11.0
        CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=11.0 SDKROOT=/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk CPM_SOURCE_CACHE=$HOME/.cache/CPM PIP_RETRIES=10 PIP_TIMEOUT=60 PIP_DEFAULT_TIMEOUT=60
        CIBW_BEFORE_BUILD_LINUX: >
          pip install ninja &&
          git config --global --add safe.directory "*"
        CIBW_ENVIRONMENT_LINUX: COOLPROP_CMAKE=default,NATIVE CPM_SOURCE_CACHE=/root/.cache/CPM PIP_RETRIES=10 PIP_TIMEOUT=60 PIP_DEFAULT_TIMEOUT=60
        # Linux wheels build inside the manylinux container, which does not
        # inherit host env vars; forward the resolved version through so the
        # version provider sees it. macOS/Windows build on the host directly.
        CIBW_ENVIRONMENT_PASS_LINUX: COOLPROP_VERSION_OVERRIDE
        CIBW_BUILD: cp${{ inputs.python-version }}-*
        CIBW_ARCHS_MACOS: ${{ inputs.arch }} # x86_64 arm64 # universal2 is redundant
        CIBW_ARCHS_WINDOWS: ${{ inputs.arch }} # AMD64 x86 # ARM64 creates problems with msgpack-c
        CIBW_ARCHS_LINUX: ${{ inputs.arch }} # i686 x86_64 aarch64 ppc64le s390x
        CIBW_TEST_COMMAND: python -c "import CoolProp; assert '?' not in CoolProp.__gitrevision__"
        CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
        CIBW_MANYLINUX_I686_IMAGE: manylinux2014
        CIBW_MANYLINUX_AARCH64_IMAGE: manylinux2014
        # CIBW_SKIP: "pp*"
        CIBW_TEST_SKIP: "*-macosx_arm64 *-win_arm64"
      with:
        package-dir: .
        output-dir: Python

    - name: Upload Files
      uses: actions/upload-artifact@v7
      with:
        name: Python-${{ inputs.os }}-${{ inputs.python-version }}-${{ inputs.arch }}
        path: |
          ./Python/*.whl
